[program:reverb-aura-staging]
process_name=%(program_name)s
command=php /var/www/aura-staging/artisan reverb:start --host=127.0.0.1 --port=8080
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/aura-staging/storage/logs/reverb.log
stopwaitsecs=3600


sudo cp /var/www/aura-staging/reverb-aura-staging.conf /etc/supervisor/conf.d/reverb-aura-staging.conf

sudo supervisorctl reread
sudo supervisorctl update

sudo supervisorctl status reverb-aura-staging